<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Metagri AI案内Bot</title>
  <style>
    :root { color-scheme: light; --green:#2D6A4F; --yellow:#F4D35E; --ink:#1d2520; --line:#d8e0da; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color:var(--ink); background:#f7faf8; }
    header { background:var(--green); color:white; padding:18px 22px; }
    h1 { margin:0; font-size:20px; letter-spacing:0; }
    main { max-width:980px; margin:0 auto; padding:20px; }
    form { display:grid; grid-template-columns:1fr auto; gap:10px; margin-bottom:18px; }
    input { font-size:16px; padding:13px 14px; border:1px solid var(--line); border-radius:6px; min-width:0; }
    button { border:0; background:var(--green); color:white; padding:0 18px; border-radius:6px; font-weight:700; cursor:pointer; }
    .panel { background:white; border:1px solid var(--line); border-radius:8px; padding:16px; margin:12px 0; }
    .question { font-weight:700; border-left:5px solid var(--yellow); padding-left:10px; }
    .answer { line-height:1.8; }
    .source-details { margin-top:14px; color:#526158; font-size:13px; }
    .source-details summary { cursor:pointer; font-weight:700; }
    .sources { margin:8px 0 0; padding-left:22px; }
    .sources li { margin:5px 0; }
    .empty { color:#526158; }
    @media (max-width: 640px) {
      form { grid-template-columns:1fr; }
      button { min-height:44px; }
    }
  </style>
</head>
<body>
  <header><h1>Metagri AI案内Bot</h1></header>
  <main>
    <form id="chat-form">
      <input id="question" autocomplete="off" placeholder="例: Metagri研究所の取り組みは？">
      <button type="submit">質問</button>
    </form>
    <div id="messages" class="empty">公開情報にもとづいて回答します。確認できない内容は、その旨を返します。</div>
  </main>
  <script>
    const form = document.querySelector("#chat-form");
    const input = document.querySelector("#question");
    const messages = document.querySelector("#messages");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      messages.classList.remove("empty");
      messages.insertAdjacentHTML("afterbegin", `<div class="panel question">${escapeHtml(question)}</div>`);
      input.value = "";
      const pending = document.createElement("div");
      pending.className = "panel";
      pending.textContent = "検索中...";
      messages.prepend(pending);
      const local = publicFastAnswer(question);
      if (local) {
        pending.innerHTML = render(local);
        return;
      }
      try {
        const response = await fetch("/api/ask", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({question})
        });
        const payload = await response.json();
        pending.innerHTML = render(payload);
      } catch (error) {
        pending.textContent = "回答の取得に失敗しました。時間をおいて再度お試しください。";
      }
    });

    function publicFastAnswer(question) {
      const q = question.toLowerCase();
      if (["売上", "契約", "予算", "資金源", "ライセンス", "アカウント", "請求書", "銀行", "パスワード", "認証"].some(term => question.includes(term))) {
        return {
          answer: "手元の公開情報では確認できません。Metagri研究所の公開版AI案内Botでは、売上・契約・予算・資金源・ライセンス・アカウント情報など、公開済みページで確認できない内部情報には回答しません。\n\n公開済みの取り組みや公式ページにある内容について質問してください。",
          evidence: [{file_name:"public_refusal_policy.md", heading:"公開版チャットボット 非回答方針", line:1}]
        };
      }
      if (q.includes("milk monster") || question.includes("ミルクモンスター") || q.includes("cwbj")) {
        return {
          answer: "手元の公開情報では確認できません。Metagri研究所の公開版AI案内Botでは、公式サイトや公開記事で確認できる内容に限って回答します。\n\n公開済みページがある取り組みについて質問するか、公式発表後にあらためて確認してください。",
          evidence: [{file_name:"public_refusal_policy.md", heading:"公開版チャットボット 非回答方針", line:1}]
        };
      }
      if (q.includes("metagri") && ["取り組み", "プロジェクト", "重点", "進行中"].some(term => question.includes(term))) {
        return {
          answer: "Metagri研究所の主な取り組みは、以下のように整理できます。\n\n- 農業AI通信: 農家向けにAI活用の入口を届けるWebメディア。\n- 白井市PR動画コンテスト: 動画生成AIを活用した自治体連携型の地域PR施策。\n- MLTT / MLTG: コミュニティ貢献をトークンやNFT特典に接続する仕組み。\n- 未来の農業シミュレーター: Roblox上で農業体験を提供するメタバース施策。\n- 農業AIハッカソン: 農家や地域課題を起点に、生成AIでプロトタイプを作る共創プログラム。\n- 4年間DAOレポート: コミュニティ継続の実績をデータで示す取り組み。",
          evidence: [{file_name:"metagri_overview_public.md", heading:"Metagri研究所 公開用サマリー", line:1}]
        };
      }
      if (question.includes("インターン")) {
        return {
          answer: "Metagri研究所では、学生インターンがコミュニティ運営や情報発信、農家・関係者へのインタビュー、SNS、勉強会などを担いながら、農業×新技術の現場を実践的に学ぶ体制があります。\n\n主な取り組みは次の通りです。\n\n- Discordコミュニティの運営補助。\n- 農家インタビューや関係者ヒアリングを通じた、農業現場の課題整理。\n- SNS投稿、記事化、音声配信、勉強会などの発信・共有活動。\n- 生成AI、web3、メタバースなどを農業テーマの実プロジェクトで学ぶ活動。\n\n個別インターンの氏名、所属、評価、稼働状況などは公開版では回答しません。募集状況や参加条件は変わるため、最新情報は公式サイト・Discord・運営からの案内を確認してください。",
          evidence: [{file_name:"metagri_intern_public.md", heading:"Metagri研究所 インターン活動 公開用サマリー", line:1}]
        };
      }
      if (q.includes("metagri") && ["歴史", "軌跡", "沿革", "これまで", "歩み", "あゆみ"].some(term => question.includes(term))) {
        return {
          answer: "Metagri研究所は、2022年3月に5名で始まり、2026年時点で1,300名規模のコミュニティに成長してきました。\n\n- 2022年3月: 当初5名でスタート。毎週日曜の定例MTGを継続。\n- 2022年4月以降: 農業NFT発行を開始（スイカ、トマト、シャインマスカット、いちご、マンゴー、柑橘の接ぎ木など）。\n- 立ち上げ初期から: 貢献を可視化するMLTTを発行し、トークンエコノミーを整備。\n- 2026年3月: 4年間DAOレポートを無料公開し、続くDAOの設計原則と成長実績を整理。\n- 2026年: 白井市PR動画コンテスト、農業AIハッカソン、未来の農業シミュレーター、農業AI通信などを並行展開。\n\n主なターニングポイントは、農業NFT発行の開始、MLTT / MLTGによるトークンエコノミー導入、4年間DAOレポート公開、自治体連携の本格化です。",
          evidence: [{file_name:"metagri_history_public.md", heading:"Metagri研究所 軌跡・歴史 公開用サマリー", line:1}]
        };
      }
      if (q.includes("metagri") && (question.includes("とは") || question.includes("何"))) {
        return {
          answer: "Metagri研究所は、株式会社農情人が運営する、農業×新技術の実験コミュニティです。\n\n- Discordを中心に、農業とweb3、生成AI、メタバースを組み合わせた取り組みを行っています。\n- コンセプトは「Meta（超越）× Agriculture（農業）」です。\n- 農業の固定観念をテクノロジーで超越し、新しい農業の関わり方を作ることを目指しています。",
          evidence: [{file_name:"metagri_overview_public.md", heading:"Metagri研究所 公開用サマリー", line:1}]
        };
      }
      return null;
    }

    function render(payload) {
      const body = escapeHtml(payload.answer).replaceAll("\n", "<br>");
      const sources = (payload.evidence || []).map(item => (
        `<li><strong>${escapeHtml(item.file_name)}:${item.line || 1}</strong> ${escapeHtml(item.heading || "")}</li>`
      )).join("");
      const sourceBlock = sources
        ? `<details class="source-details"><summary>参照元（${payload.evidence.length}件）</summary><ul class="sources">${sources}</ul></details>`
        : "";
      return `<div class="answer">${body}</div>${sourceBlock}`;
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[char]));
    }
  </script>
</body>
</html>
